<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pics Palace - Image Hosting</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600;700&display=swap');

        :root {
            --primary: #8b6b47;
            --accent: #d4a574;
            --dark: #1a1410;
            --light: #faf8f5;
            --success: #4ade80;
            --danger: #ef4444;
            --border: #e8dcc8;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: linear-gradient(135deg, #faf8f5 0%, #f5f0e8 100%);
            color: #1a1410;
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a1410 0%, #2d241f 100%);
            padding: 2rem;
            text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }

        .header-content {
            max-width: 1200px;
            margin: 0 auto;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #d4a574 0%, #e8c8a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .tagline {
            color: #d4a574;
            font-size: 0.95rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .status {
            margin-top: 2rem;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.9rem;
            padding: 0.75rem 1.5rem;
            background: rgba(212, 165, 116, 0.1);
            border: 1px solid #d4a574;
            border-radius: 50px;
            color: #d4a574;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
        }

        .status-dot.connected {
            background: #4ade80;
        }

        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 4rem 2rem;
        }

        .upload-section {
            background: white;
            border: 2px solid #e8dcc8;
            border-radius: 20px;
            padding: 4rem;
            margin-bottom: 4rem;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1410;
            margin-bottom: 1rem;
        }

        .section-subtitle {
            color: #8b6b47;
            font-size: 1rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        .upload-area {
            border: 3px dashed #d4a574;
            border-radius: 16px;
            padding: 4rem 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.03) 0%, rgba(232, 200, 168, 0.03) 100%);
        }

        .upload-area:hover {
            border-color: #8b6b47;
            background: linear-gradient(135deg, rgba(212, 165, 116, 0.08) 0%, rgba(232, 200, 168, 0.08) 100%);
            transform: translateY(-2px);
        }

        .upload-area.dragging {
            border-color: #8b6b47;
            background: linear-gradient(135deg, rgba(139, 107, 71, 0.15) 0%, rgba(212, 165, 116, 0.15) 100%);
        }

        .upload-icon {
            font-size: 3.5rem;
            margin-bottom: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .upload-text {
            font-size: 1.2rem;
            font-weight: 600;
            color: #1a1410;
            margin-bottom: 0.5rem;
        }

        .upload-hint {
            color: #8b6b47;
            font-size: 0.95rem;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            display: inline-block;
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 2rem;
        }

        .btn-primary {
            background: linear-gradient(135deg, #8b6b47 0%, #a87e3e 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(139, 107, 71, 0.3);
        }

        .btn-copy {
            background: rgba(212, 165, 116, 0.15);
            color: #8b6b47;
            border: 1.5px solid #d4a574;
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            margin: 0;
        }

        .btn-copy:hover {
            background: #d4a574;
            color: white;
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1.5px solid #ef4444;
            padding: 0.6rem 1.2rem;
            font-size: 0.85rem;
            margin: 0;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        .gallery-section {
            margin-top: 4rem;
        }

        .gallery-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 700;
            color: #1a1410;
            margin-bottom: 3rem;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
        }

        .image-card {
            background: white;
            border: 1px solid #e8dcc8;
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        .image-card:hover {
            border-color: #d4a574;
            transform: translateY(-10px);
            box-shadow: 0 20px 50px rgba(139, 107, 71, 0.2);
        }

        .image-preview {
            width: 100%;
            height: 220px;
            object-fit: cover;
            background: linear-gradient(135deg, #f5f0e8 0%, #ede4d1 100%);
        }

        .image-info {
            padding: 1.5rem;
        }

        .image-name {
            font-weight: 600;
            color: #1a1410;
            margin-bottom: 1rem;
            word-break: break-word;
            font-size: 1rem;
        }

        .image-url {
            background: #faf8f5;
            border: 1px solid #e8dcc8;
            border-radius: 8px;
            padding: 0.75rem;
            margin-bottom: 1.5rem;
            max-height: 80px;
            overflow-y: auto;
        }

        .image-url-text {
            color: #8b6b47;
            word-break: break-all;
            font-size: 0.75rem;
            font-family: 'Courier New', monospace;
            line-height: 1.4;
        }

        .image-actions {
            display: flex;
            gap: 0.75rem;
        }

        .image-actions .btn {
            flex: 1;
            padding: 0.6rem;
            font-size: 0.8rem;
            margin: 0;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #8b6b47;
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
            opacity: 0.5;
        }

        .notification {
            position: fixed;
            top: 2rem;
            right: 2rem;
            padding: 1.2rem 1.8rem;
            border-radius: 10px;
            animation: slideIn 0.3s ease-out;
            z-index: 1000;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .notification.success {
            background: #4ade80;
            color: white;
        }

        .notification.error {
            background: #ef4444;
            color: white;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(100%);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @media (max-width: 768px) {
            .logo {
                font-size: 2rem;
            }

            main {
                padding: 2rem 1rem;
            }

            .upload-section {
                padding: 2rem;
            }

            .upload-area {
                padding: 2rem 1rem;
            }

            .gallery-grid {
                grid-template-columns: 1fr;
            }

            .section-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="logo">Pics Palace</div>
            <div class="tagline">Premium Image Hosting</div>
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Connecting...</span>
            </div>
        </div>
    </header>

    <main>
        <section class="upload-section">
            <h1 class="section-title">Upload Your Images</h1>
            <p class="section-subtitle">Professional image hosting with shareable links for your business needs</p>
            
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">🖼️</div>
                <p class="upload-text">Drop your images here or click to browse</p>
                <p class="upload-hint">PNG, JPG, WebP • Max 3 MB</p>
                <input type="file" id="fileInput" multiple accept="image/*">
                <button class="btn btn-primary" id="selectBtn">Choose Images</button>
            </div>
        </section>

        <section class="gallery-section">
            <h2 class="gallery-title">Your Image Gallery</h2>
            <div id="gallery" class="gallery-grid">
                <div class="empty-state">
                    <div class="empty-icon">📸</div>
                    <p>No images yet. Start uploading to see them here!</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        const SUPABASE_URL = 'https://uualcljfxdwyfhtcmqou.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV1YWxjbGpmeGR3eWZodGNtcW91Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTkzMzgsImV4cCI6MjA4OTQ5NTMzOH0.t4Gc9twyqwpSZhONbWx2oBSq9KDrWN73akBToXrLNdY';
        
        const sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const selectBtn = document.getElementById('selectBtn');
        const gallery = document.getElementById('gallery');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        let images = [];

        async function init() {
            try {
                const { count } = await sbClient
                    .from('product_images')
                    .select('*', { count: 'exact', head: true });
                
                statusDot.classList.add('connected');
                statusText.textContent = 'Connected';
                loadImages();
            } catch (err) {
                console.error(err);
                statusText.textContent = 'Connection error';
            }
        }

        async function loadImages() {
            const { data } = await sbClient
                .from('product_images')
                .select('*')
                .order('uploaded_at', { ascending: false });
            
            images = data || [];
            renderGallery();
        }

        selectBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (e) => {
            handleFiles(Array.from(e.target.files));
        });

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragging');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragging');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragging');
            handleFiles(Array.from(e.dataTransfer.files));
        });

        async function handleFiles(files) {
            for (const file of files) {
                if (!file.type.startsWith('image/')) continue;
                if (file.size > 3 * 1024 * 1024) {
                    showNotification(`${file.name} too large (max 3MB)`, 'error');
                    continue;
                }
                await uploadFile(file);
            }
            fileInput.value = '';
        }

        async function uploadFile(file) {
            try {
                uploadArea.classList.add('uploading');

                const reader = new FileReader();
                reader.onload = async (e) => {
                    const dataUrl = e.target.result;
                    const fileId = `img-${Date.now()}-${Math.random().toString(36).substr(2, 9)}`;
                    
                    // Generate the public HTTP URL
                    const publicUrl = `https://picspalace.netlify.app/.netlify/functions/serve-image?id=${fileId}`;

                    const { data, error } = await sbClient
                        .from('product_images')
                        .insert({
                            file_name: file.name,
                            file_path: fileId,
                            public_url: dataUrl,
                            file_size: file.size,
                            mime_type: file.type
                        })
                        .select()
                        .single();

                    if (error) throw error;

                    // Return the HTTP URL to display
                    data.public_url = publicUrl;
                    images.unshift(data);
                    renderGallery();
                    showNotification(`✓ ${file.name} uploaded!`, 'success');
                };
                reader.readAsDataURL(file);
            } catch (error) {
                console.error(error);
                showNotification(`Error: ${error.message}`, 'error');
            } finally {
                uploadArea.classList.remove('uploading');
            }
        }

        function renderGallery() {
            if (images.length === 0) {
                gallery.innerHTML = '<div class="empty-state"><div class="empty-icon">📸</div><p>No images yet. Start uploading to see them here!</p></div>';
                return;
            }

            gallery.innerHTML = images.map(img => `
                <div class="image-card">
                    <img src="${img.public_url.includes('picspalace') ? img.public_url : 'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22><rect fill=%22%23f5f0e8%22 width=%22100%22 height=%22100%22/></svg>'}" alt="${img.file_name}" class="image-preview" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22><text x=%2250%25%22 y=%2250%25%22 text-anchor=%22middle%22 fill=%22%238b6b47%22>Preview</text></svg>'">
                    <div class="image-info">
                        <div class="image-name">${img.file_name}</div>
                        <div class="image-url">
                            <div class="image-url-text">${img.public_url}</div>
                        </div>
                        <div class="image-actions">
                            <button class="btn btn-copy" onclick="copyUrl('${img.public_url}')">Copy URL</button>
                            <button class="btn btn-delete" onclick="deleteImage('${img.id}')">Delete</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.copyUrl = async function(url) {
            try {
                await navigator.clipboard.writeText(url);
                showNotification('✓ URL copied!', 'success');
            } catch (err) {
                showNotification('Failed to copy', 'error');
            }
        }

        window.deleteImage = async function(id) {
            if (!confirm('Delete this image?')) return;

            try {
                const { error } = await sbClient
                    .from('product_images')
                    .delete()
                    .eq('id', id);

                if (error) throw error;

                images = images.filter(i => i.id !== id);
                renderGallery();
                showNotification('✓ Deleted', 'success');
            } catch (error) {
                showNotification(`Error: ${error.message}`, 'error');
            }
        }

        function showNotification(message, type = 'success') {
            const notify = document.createElement('div');
            notify.className = `notification ${type}`;
            notify.textContent = message;
            document.body.appendChild(notify);
            setTimeout(() => notify.remove(), 3000);
        }

        init();
    </script>
</body>
</html>
